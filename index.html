<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV Editor - Trương Đình Anh</title>

    <!-- Fonts & Styles -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/cv-layout.css">
    <!-- Router Logic (Xử lý nạp dữ liệu ngay lập tức) -->
    <script src="js/cv-router.js"></script>
</head>

<body>

    <a class="skip-link" href="#cvContent">Bỏ qua phần điều khiển và đến nội dung CV</a>

    <div class="controls" aria-label="CV controls">
        <!-- MENU CHỌN PHIÊN BẢN (DỌC) -->
        <nav class="version-switch" aria-label="Chọn phiên bản CV">
            <div class="version-label">📦 Bản CV</div>
            <a href="index.html" class="version-item" id="ver-default">Chung</a>
            <a href="index.html?type=frontend" class="version-item" id="ver-frontend">Frontend</a>
            <a href="index.html?type=backend" class="version-item" id="ver-backend">Backend</a>
            <a href="truong-dinh-anh-agileops.html" class="version-item" id="ver-ai">🤖 AgileOps AI</a>
            <a href="truong-dinh-anh-agileops-webdev.html" class="version-item" id="ver-ai-webdev">🌐 AgileOps WebDev</a>
        </nav>

        <div class="lang-switch" role="group" aria-label="Chọn ngôn ngữ CV">
            <button type="button" class="lang-item active" id="lang-vi" aria-pressed="true">VI</button>
            <button type="button" class="lang-item" id="lang-en" aria-pressed="false">EN</button>
        </div>

        <div class="font-customizer" role="group" aria-label="Tùy chỉnh cỡ chữ">
            <button id="font-decrease" type="button" title="Giảm font chữ" aria-label="Giảm cỡ chữ CV">A-</button>
            <div class="font-size-display" id="fontSizeDisplay" aria-live="polite">10pt</div>
            <button id="font-increase" type="button" title="Tăng font chữ" aria-label="Tăng cỡ chữ CV">A+</button>
        </div>

        <button class="magic-btn" id="magicFitBtn" type="button" title="Tự động căn chỉnh vừa 1 trang A4"
            aria-label="Tự động căn chỉnh CV vừa một trang A4">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round">
                <path
                    d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83" />
            </svg>
            Magic Fit ✨
        </button>

        <button class="reset-btn" id="resetBtn" type="button" title="Đặt lại về mặc định"
            aria-label="Đặt lại bố cục CV về mặc định">Reset 🔄</button>
        <button class="a4-preview-btn" id="a4PreviewBtn" type="button" title="Bật hoặc tắt xem khung A4 cố định"
            aria-pressed="false" aria-label="Bật hoặc tắt chế độ xem trước A4">📄 A4 Preview</button>

        <div class="btn-wrapper">
            <div class="print-tooltip" id="printTooltip" role="tooltip">
                <div class="tooltip-title">📋 Hướng dẫn tải PDF</div>
                <div class="tooltip-step"><span class="step-num">1</span> <span class="step-text">Mở hộp thoại In</span>
                </div>
                <div class="tooltip-step"><span class="step-num">2</span> <span class="step-text">Chọn <b>Save as
                            PDF</b></span></div>
                <div class="tooltip-step"><span class="step-num">3</span> <span class="step-text">Chọn Margins:
                        <b>None</b></span></div>
            </div>
            <button class="download-btn" id="downloadBtn" type="button" aria-describedby="printTooltip"
                aria-label="Mở hộp thoại in hoặc lưu CV dưới dạng PDF">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="6 9 6 2 18 2 18 9" />
                    <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2" />
                    <rect width="12" height="8" x="6" y="14" />
                </svg>
                <span id="btn-text">In / Tải PDF</span>
            </button>
        </div>
    </div>

    <main class="cv-preview" id="cvContent" tabindex="-1">
        <!-- Nội dung đổ bởi cv-renderer.js -->
    </main>
</body>

</html>
